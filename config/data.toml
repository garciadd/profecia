[project]
main_dir = "/mnt_sentinel_a/ferag/data" 
raw_dir = "/mnt_sentinel_a/ferag/data/raw"
processed_base_dir = "/mnt_sentinel_a/ferag/data/processed"
# mask_dir = "/mnt_sentinel_a/ferag/data/masks"

[data]
temporal_resolution = "monthly" # "monthly" o "annual"
mask_names = ["land"] # ["land"]
start_year = 1982
end_year_inclusive = 2022
dtype = "float32"
variable_names = ['LAI', 'SM1', 'SM2',  'TP']
target_name = "LAI"

# roi = { lat_min = -60.0, lat_max = 80.0, lon_min = -180.0, lon_max = 180.0 }
# Si no se define, se usa todo el globo disponible.
[mlflow]
enabled = true
tracking_uri="https://mlflow.cloud.ai4eosc.eu/"
tracking_username="aguilarf@ifca.unican.es"
tracking_password=""
experiment_name="land_without_lag"
