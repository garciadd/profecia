[project]
main_dir = "/mnt_sentinel_a/ferag/data" 

[data]
temporal_resolution = "monthly" # "monthly" o "annual"
mask_names = ["landcover_grassland"] # ["land"]
start_year = 1982
end_year_inclusive = 2022
dtype = "float32"
variable_names = ['LAI', 'SM1', 'SM2',  'TP', 'T2M', 'SSRD', 'VPD']
target_name = "LAI"

