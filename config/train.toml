[project]
data_config = "data.toml" 
model_base_dir = "/mnt_sentinel_a/ferag/data/models"

[split]
mode = "random_observation" # "spatial_pixel" o "random_observation"
train_fraction = 0.8 # Fracción de píxeles válidos o de observaciones válidas que se retienen: 0.1, 0.3, 1.0
test_fraction = 0.2 # Fracción de lo retenido que se manda a test: 0.1, 0.2
min_valid_fraction = 0.0 # Filtro mínimo de validez temporal por pixel: 0.0, 0.25, 0.5, 1.0
seed = 42 

[model]
name = "rf" # "rf", "hgb", "mlp"
scaler = "none" # "none", "standard", "robust"
random_state = 42

[model.params]

# si model.name = "rf":
n_estimators = 500
max_depth = 20
min_samples_leaf = 1
max_features = "sqrt"
n_jobs = 2
bootstrap = true
max_samples = 0.3

# si model.name = "hgb":
#loss = "squared_error"
#learning_rate = 0.1
#max_iter = 300
#max_depth = 12
#min_samples_leaf = 50

# si model.name = "mlp":
# hidden_layer_sizes = [128, 64]
# activation = "relu"
# solver = "adam"
# alpha = 0.0001
# batch_size = 2048
# learning_rate = "adaptive"
# learning_rate_init = 0.001
# max_iter = 300
# early_stopping = true
# validation_fraction = 0.1

[cv]
enabled = false
n_splits = 5
n_iter = 25
scoring = "neg_root_mean_squared_error"
n_jobs = 1
verbose = 1

[cv.search_space.hgb]
learning_rate = [0.03, 0.05, 0.1]
max_iter = [200, 300, 500]
max_depth = [6, 10, 12, 16]
min_samples_leaf = [20, 50, 100]
l2_regularization = [0.0, 0.01, 0.1]

[cv.search_space.rf]
n_estimators = [100, 200, 400]
max_depth = [10, 20, 30]
min_samples_leaf = [1, 5, 10]
max_features = ["sqrt", 0.5, 1.0]
bootstrap = [true]
max_samples = [0.3, 0.5, 0.8]

# [cv.search_space.mlp]
# hidden_layer_sizes = [[128, 64], [256, 128], [256, 128, 64]]
# alpha = [0.0001, 0.001, 0.01]
# learning_rate_init = [0.0005, 0.001, 0.003]
# batch_size = [1024, 2048, 4096]

[runtime]
mmap_mode = "r"
[explainability]
enabled = false
run_after_training = false
method = "shap"
output_subdir = "shap"
group_column = "landcover_label"
local_error_column = "abs_error"

[explainability.shap]
max_samples_per_group = 1000
max_samples_total = 5000
sample_fraction = 0.5
min_group_samples = 30
